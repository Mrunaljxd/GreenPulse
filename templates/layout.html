<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenPulse</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#e9f6ea] text-gray-800">

<!-- NAVBAR -->
<nav class="bg-white shadow-md py-4 px-6 flex items-center justify-between">

    <!-- LOGO + BRAND -->
    <a href="/" class="flex items-center gap-3 font-bold text-2xl text-green-700">
        <img src="{{ url_for('static', filename='images/greenpulse-logo.png') }}" 
             class="h-12 w-12 rounded-lg shadow-sm object-contain">
        GreenPulse
    </a>

    <!-- NAV LINKS -->
    <div class="flex items-center gap-6">

        {% if current_user.is_authenticated %}
            <a href="/dashboard" class="hover:text-green-600 font-semibold">Dashboard</a>
            <a href="/leaderboard" class="hover:text-green-600 font-semibold">Leaderboard</a>
            <a href="/balance" class="hover:text-green-600 font-semibold">Balance</a>

            {% if current_user.role == 'admin' %}
                <a href="/admin/verify" class="hover:text-red-600 font-semibold">Verify Uploads</a>
            {% endif %}

            <!-- SEARCH BAR (Navbar) -->
            <form action="/search" method="GET" class="flex">
                <input
                    type="text"
                    name="q"
                    placeholder="Search plants..."
                    class="px-4 py-2 rounded-l-xl bg-white border border-green-300 
                           focus:outline-none focus:ring-2 focus:ring-green-400 text-gray-800"
                    required
                >
                <button class="bg-green-600 text-white px-4 py-2 rounded-r-xl font-bold 
                               hover:bg-green-500 transition">
                    🔍
                </button>
            </form>

            <a href="/logout" class="hover:text-green-600 font-semibold">Logout</a>

        {% else %}
            <a href="/login" class="hover:text-green-600">Login</a>
            <a href="/signup" class="hover:text-green-600">Sign Up</a>
        {% endif %}
    </div>

</nav>

<!-- PAGE CONTENT -->
<div class="max-w-5xl mx-auto p-6">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer class="text-center py-6 text-gray-500 mt-10">
    © 2025 GreenPulse. Together we grow a greener future.
</footer>

</body>
</html>
