{% extends "layout.html" %}
{% block content %}

<!-- Page Background Accent -->
<div class="absolute inset-0 bg-gradient-to-b from-green-50 to-[#e9f6ea] -z-10"></div>

<!-- Center Wrapper -->
<div class="flex justify-center items-center py-10">

    <div class="bg-white/90 backdrop-blur-md shadow-xl rounded-2xl p-10 w-full max-w-md border border-green-100
                animate-fadeIn">

        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <img src="{{ url_for('static', filename='images/greenpulse-logo.png') }}"
                 class="h-20 w-20 object-contain rounded-xl shadow-sm">
        </div>

        <!-- Heading -->
        <h2 class="text-3xl font-bold text-center text-green-700 mb-2">Welcome Back</h2>
        <p class="text-center text-gray-600 mb-8">Log in to continue growing with GreenPulse 🌱</p>

        <!-- Form -->
        <form action="/login" method="POST" class="space-y-5">

            <!-- Username -->
            <div>
                <label class="text-gray-700 font-medium">Username</label>
                <input type="text" name="username" required
                    class="mt-1 w-full px-4 py-3 rounded-xl border border-green-200 focus:ring-2 
                           focus:ring-green-600 focus:outline-none transition">
            </div>

            <!-- Password -->
            <div>
                <label class="text-gray-700 font-medium">Password</label>
                <input type="password" name="password" required
                    class="mt-1 w-full px-4 py-3 rounded-xl border border-green-200 focus:ring-2 
                           focus:ring-green-600 focus:outline-none transition">
            </div>

            <!-- Submit -->
            <button
                class="w-full bg-green-700 text-white py-3 rounded-xl font-semibold text-lg 
                       hover:bg-green-800 transition shadow-md">
                Log In
            </button>
        </form>

        <!-- Sign Up Link -->
        <p class="text-center text-gray-600 mt-6">
            Don't have an account?
            <a href="/signup" class="text-green-700 font-semibold hover:underline">Sign up</a>
        </p>
    </div>
</div>

<!-- Fade In Animation -->
<style>
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.animate-fadeIn {
    animation: fadeIn 0.5s ease-out;
}
</style>

{% endblock %}
